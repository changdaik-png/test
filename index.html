<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문장 짜임 탐험대 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        .animate-bounce-short {
            animation: bounce 0.5s ease-in-out 1;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-yellow-50 min-h-screen flex items-center justify-center p-4 text-gray-800">

    <div id="quiz-container" class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-yellow-200">
        <!-- 상단 헤더 -->
        <div class="bg-yellow-400 p-6 text-center">
            <h1 class="text-2xl font-bold text-white flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                문장 짜임 탐험대
            </h1>
            <div id="progress-tag" class="mt-2 bg-yellow-500 text-white text-sm font-bold px-3 py-1 rounded-full inline-block">
                문제 1 / 10
            </div>
        </div>

        <div id="content-area" class="p-6">
            <!-- 퀴즈 화면 -->
            <div id="quiz-screen" class="space-y-6">
                <div id="question-text" class="text-xl font-bold text-center leading-snug">
                    문제가 여기에 표시됩니다.
                </div>

                <div id="options-container" class="space-y-3">
                    <!-- 버튼들이 여기에 생성됨 -->
                </div>

                <!-- 정답 피드백 -->
                <div id="feedback-box" class="hidden p-4 rounded-2xl text-center">
                    <div id="feedback-status" class="flex items-center justify-center gap-2 font-bold mb-1"></div>
                    <p id="feedback-message" class="text-sm"></p>
                </div>

                <!-- 다음 버튼 -->
                <button id="next-btn" class="hidden w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg transition-transform active:scale-95">
                    <span>다음 문제로</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
            </div>

            <!-- 결과 화면 -->
            <div id="result-screen" class="hidden text-center space-y-8 py-4">
                <div class="relative inline-block">
                    <svg class="text-yellow-400 mx-auto" xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                    <svg class="text-orange-400 absolute -top-2 -right-2 animate-pulse" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
                
                <div>
                    <h2 class="text-3xl font-bold mb-2">모험 완료!</h2>
                    <div class="text-5xl font-black text-blue-600 mb-2">
                        <span id="final-score">0</span> <span class="text-2xl text-gray-600">점</span>
                    </div>
                    <p id="result-comment" class="text-lg text-gray-600"></p>
                </div>

                <button id="retry-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg transition-transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    다시 도전하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "'지호가 말합니다.'라는 문장에서 '누가'에 해당하는 부분은 어디인가요?",
                options: ["지호가", "말합니다", "산책을", "나비가"],
                answer: 0,
                feedback: "딩동댕! '지호가'는 이 문장에서 행동의 주인인 '누가'를 나타내요."
            },
            {
                question: "'햇볕이 따뜻합니다.'는 어떤 문장의 짜임인가요?",
                options: ["누가 어찌하다", "무엇이 어떠하다", "무엇이 무엇이다", "누가 무엇이다"],
                answer: 1,
                feedback: "맞았어요! 햇볕의 상태(따뜻함)를 나타내므로 '무엇이 어떠하다'예요."
            },
            {
                question: "움직임을 나타내는 말(걷다, 올라가다 등)은 문장의 짜임 중 무엇에 해당할까요?",
                options: ["어떠하다", "무엇이다", "어찌하다", "누가"],
                answer: 2,
                feedback: "정답! 몸이나 물건의 움직임을 나타내는 말은 '어찌하다'라고 해요."
            },
            {
                question: "성질이나 상태를 나타내는 말(맑다, 행복하다 등)은 무엇에 해당할까요?",
                options: ["어찌하다", "어떠하다", "무엇이다", "누구이다"],
                answer: 1,
                feedback: "훌륭해요! 기분이나 모양, 성질을 설명하는 말은 '어떠하다'예요."
            },
            {
                question: "'오늘은 일요일입니다.'는 어떤 문장의 짜임인가요?",
                options: ["무엇이 무엇이다", "무엇이 어찌하다", "누가 어떠하다", "누가 어찌하다"],
                answer: 0,
                feedback: "정답입니다! 대상이 무엇인지 정체를 알려주는 '무엇이 무엇이다' 짜임이에요."
            },
            {
                question: "'노란 나비가 파란 하늘로 날아오릅니다.'에서 '어찌하다'에 해당하는 말은?",
                options: ["노란 나비가", "파란 하늘로", "날아오릅니다", "하늘은"],
                answer: 2,
                feedback: "좋아요! 나비가 움직이는 모습인 '날아오릅니다'가 '어찌하다' 부분이에요."
            },
            {
                question: "다음 중 '어떠하다(성질/상태)'에 해당하는 낱말은 무엇인가요?",
                options: ["뛴다", "시원하다", "먹다", "날아다니다"],
                answer: 1,
                feedback: "딩동댕! '시원하다'는 상태를 나타내는 말이에요. 나머지는 움직임이죠!"
            },
            {
                question: "다음 중 '어찌하다(움직임)'에 해당하는 낱말은 무엇인가요?",
                options: ["행복하다", "파랗다", "많다", "뛰어간다"],
                answer: 3,
                feedback: "맞았어요! '뛰어간다'는 발을 빠르게 움직이는 행동을 나타내요."
            },
            {
                question: "'공원에는 사람들이 많습니다.'에서 '어떠하다'에 해당하는 부분은?",
                options: ["공원에는", "사람들이", "많습니다", "공원이"],
                answer: 2,
                feedback: "정답! 상태가 어떠한지(많음)를 나타내는 '많습니다'가 정답이에요."
            },
            {
                question: "문장의 짜임을 알기 위해 '누가/무엇이' 뒤에 올 수 있는 세 가지가 아닌 것은?",
                options: ["어찌하다", "어떠하다", "무엇이다", "언제이다"],
                answer: 3,
                feedback: "마지막까지 잘했어요! 문장의 짜임은 어찌하다, 어떠하다, 무엇이다 세 가지를 배웠어요."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let isAnswered = false;

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackBox = document.getElementById('feedback-box');
        const feedbackStatus = document.getElementById('feedback-status');
        const feedbackMessage = document.getElementById('feedback-message');
        const nextBtn = document.getElementById('next-btn');
        const progressTag = document.getElementById('progress-tag');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreText = document.getElementById('final-score');
        const resultComment = document.getElementById('result-comment');
        const retryBtn = document.getElementById('retry-btn');

        function initQuiz() {
            currentQuestion = 0;
            score = 0;
            isAnswered = false;
            quizScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            const data = quizData[currentQuestion];
            
            progressTag.innerText = `문제 ${currentQuestion + 1} / ${quizData.length}`;
            questionText.innerText = data.question;
            feedbackBox.classList.add('hidden');
            nextBtn.classList.add('hidden');
            
            optionsContainer.innerHTML = '';
            data.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 rounded-2xl text-left font-semibold transition-all duration-200 border-2 bg-white border-yellow-100 hover:border-yellow-400 hover:bg-yellow-50 shadow-sm flex items-center gap-3";
                btn.innerHTML = `
                    <span class="w-8 h-8 flex items-center justify-center rounded-full text-sm bg-yellow-200">
                        ${index + 1}
                    </span>
                    ${option}
                `;
                btn.onclick = () => handleAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedIndex) {
            if (isAnswered) return;
            isAnswered = true;

            const data = quizData[currentQuestion];
            const isCorrect = selectedIndex === data.answer;
            
            if (isCorrect) score += 10;

            // 버튼 스타일 업데이트
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach((btn, index) => {
                btn.disabled = true;
                if (index === data.answer) {
                    btn.classList.replace('bg-white', 'bg-green-100');
                    btn.classList.replace('border-yellow-100', 'border-green-500');
                    btn.classList.add('text-green-700');
                    btn.querySelector('span').classList.replace('bg-yellow-200', 'bg-green-500');
                    btn.querySelector('span').classList.add('text-white');
                } else if (index === selectedIndex) {
                    btn.classList.replace('bg-white', 'bg-red-100');
                    btn.classList.replace('border-yellow-100', 'border-red-500');
                    btn.classList.add('text-red-700');
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            // 피드백 박스 표시
            feedbackBox.classList.remove('hidden');
            feedbackBox.classList.add('animate-bounce-short');
            setTimeout(() => feedbackBox.classList.remove('animate-bounce-short'), 500);

            if (isCorrect) {
                feedbackBox.className = "p-4 rounded-2xl text-center bg-green-50 text-green-700 border border-green-200";
                feedbackStatus.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 정답이에요!`;
            } else {
                feedbackBox.className = "p-4 rounded-2xl text-center bg-red-50 text-red-700 border border-red-200";
                feedbackStatus.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 아쉬워요!`;
            }
            feedbackMessage.innerText = data.feedback;

            // 다음 버튼 표시
            nextBtn.classList.remove('hidden');
            if (currentQuestion === quizData.length - 1) {
                nextBtn.querySelector('span').innerText = "결과 확인하기";
            } else {
                nextBtn.querySelector('span').innerText = "다음 문제로";
            }
        }

        nextBtn.onclick = () => {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            finalScoreText.innerText = score;
            
            let comment = "";
            if (score === 100) comment = "완벽해요! 문장 박사가 되셨군요!";
            else if (score >= 80) comment = "정말 잘했어요! 거의 다 맞혔어요!";
            else if (score >= 60) comment = "좋은 실력이에요! 조금만 더 복습해봐요!";
            else comment = "다시 한번 도전해서 실력을 키워볼까요?";
            
            resultComment.innerText = comment;
        }

        retryBtn.onclick = initQuiz;

        // 시작
        window.onload = initQuiz;
    </script>
</body>
</html>
